syntax = "proto3";

package room;

// The go_package option defines the import path for the generated code.
// We are outputting to gen/room
option go_package = "booking-be/gen/room;room";

service RoomService {
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse) {}
  rpc GetRoomAvailability(GetRoomAvailabilityRequest) returns (GetRoomAvailabilityResponse) {}
}

message ListRoomsRequest {
  // Can be expanded with pagination or filters
}

message Room {
  string id = 1;
  string name = 2;
  int32 capacity = 3;
  float price_per_night = 4;
}

message ListRoomsResponse {
  repeated Room rooms = 1;
}

message GetRoomAvailabilityRequest {
  string room_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message GetRoomAvailabilityResponse {
  bool is_available = 1;
}
