syntax = "proto3";

package booking;

// The go_package option defines the import path for the generated code.
// We are outputting to gen/booking
option go_package = "booking-be/gen/booking;booking";

service BookingService {
  rpc CreateBooking(CreateBookingRequest) returns (CreateBookingResponse) {}
  rpc GetBooking(GetBookingRequest) returns (GetBookingResponse) {}
}

message CreateBookingRequest {
  string room_id = 1;
  string user_id = 2;
  string start_date = 3;
  string end_date = 4;
}

message CreateBookingResponse {
  string booking_id = 1;
  string status = 2;
}

message GetBookingRequest {
  string booking_id = 1;
}

message GetBookingResponse {
  string booking_id = 1;
  string room_id = 2;
  string user_id = 3;
  string start_date = 4;
  string end_date = 5;
  string status = 6;
}
